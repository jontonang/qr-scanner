<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Gathering 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin-bottom:20px}
.event-box{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:25px;border-radius:12px;text-align:center;margin-bottom:25px}
.event-box h2{font-size:2em;margin-bottom:10px}
#scanInput{width:100%;padding:20px;font-size:20px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;box-sizing:border-box;margin:15px 0}
#scanInput:focus{outline:none;border-color:#5568d3}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;text-align:center;margin:15px 0}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none}
.result h3{color:#155724;margin-bottom:15px}
.result p{margin:10px 0}
.stats{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.stat-number{font-size:4em;font-weight:bold}
.stat-label{font-size:1.2em;margin-top:10px}
button{width:100%;padding:15px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:18px;margin:8px 0}
.btn-export{background:#28a745;color:#fff}
.btn-clear{background:#dc3545;color:#fff}
.log{background:#f8f9fa;padding:15px;border-radius:10px;max-height:350px;overflow-y:auto;margin-top:15px}
.log-entry{background:#fff;padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid #667eea}
.log-entry p{margin:5px 0;color:#555}
</style>
</head>
<body>
<div class="container">
<h1>📱 QR Scanner</h1>
<div class="event-box">
<h2>📅 Annual Gathering 2026</h2>
<p>Auto-Scan Mode</p>
</div>
<input type="text" id="scanInput" placeholder="Ready to scan..." autofocus>
<div class="status" id="status">Ready to scan</div>
<div class="result" id="result">
<h3>✅ Saved!</h3>
<p><strong>Name:</strong> <span id="rName"></span></p>
<p><strong>Email:</strong> <span id="rEmail"></span></p>
<p><strong>Time:</strong> <span id="rTime"></span></p>
</div>
<div class="stats">
<div class="stat-number" id="count">0</div>
<div class="stat-label">Total Scanned</div>
</div>
<button class="btn-export" onclick="doExport()">📥 Export CSV</button>
<button class="btn-clear" onclick="doClear()">🗑️ Clear All</button>
<h3 style="color:#333;margin:20px 0 10px">Recent Scans:</h3>
<div class="log" id="log">No scans yet</div>
</div>
<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-rszpjsd8KOfeiX2oQbQYL2ELxbJkh6QxJoib-i7fTFRqzlciDvkYXjNxipVg8hiSug/exec';
var dataList = [];
var totalCount = 0;
var scanTimer;
var prevScan = '';
var prevTime = 0;

var savedStr = localStorage.getItem('attendance');
if(savedStr){
try{
dataList = JSON.parse(savedStr);
totalCount = dataList.length;
refreshDisplay();
}catch(err){}
}

var inputBox = document.getElementById('scanInput');
var statusBox = document.getElementById('status');

inputBox.focus();
document.addEventListener('click', function(){
inputBox.focus();
});

inputBox.addEventListener('input', function(){
clearTimeout(scanTimer);
statusBox.textContent = 'Scanning...';
statusBox.style.background = '#fff3cd';
statusBox.style.color = '#856404';
scanTimer = setTimeout(function(){
var txt = inputBox.value.trim();
if(txt){
handleSubmit(txt);
}
}, 100);
});

inputBox.addEventListener('keypress', function(evt){
if(evt.key === 'Enter'){
evt.preventDefault();
clearTimeout(scanTimer);
var txt = inputBox.value.trim();
if(txt){
handleSubmit(txt);
}
}
});

function handleSubmit(txt){
var currentMs = Date.now();
if(txt === prevScan && (currentMs - prevTime) < 2000){
inputBox.value = '';
statusBox.textContent = 'Ready to scan';
statusBox.style.background = '#d4edda';
statusBox.style.color = '#155724';
return;
}
prevScan = txt;
prevTime = currentMs;
var personName = '';
var personEmail = '';
try{
var obj = JSON.parse(txt);
personName = obj.name || '';
personEmail = obj.email || '';
}catch(err){
if(txt.indexOf(',') > -1){
var arr = txt.split(',');
personName = arr[0].trim();
personEmail = arr[1] ? arr[1].trim() : 'N/A';
}else{
personName = txt;
personEmail = 'N/A';
}
}
if(!personName){
statusBox.textContent = 'Ready to scan';
statusBox.style.background = '#d4edda';
statusBox.style.color = '#155724';
inputBox.value = '';
return;
}
saveData(personName, personEmail);
inputBox.value = '';
}

function saveData(nm, em){
var dateObj = new Date();
var rec = {
event: 'Annual Gathering 2026',
name: nm,
email: em,
time: dateObj.toLocaleString('en-SG')
};
dataList.unshift(rec);
localStorage.setItem('attendance', JSON.stringify(dataList));
totalCount = dataList.length;
document.getElementById('rName').textContent = nm;
document.getElementById('rEmail').textContent = em;
document.getElementById('rTime').textContent = rec.time;
document.getElementById('result').style.display = 'block';
setTimeout(function(){
document.getElementById('result').style.display = 'none';
}, 4000);
refreshDisplay();
statusBox.textContent = 'Syncing...';
statusBox.style.background = '#e7f3ff';
statusBox.style.color = '#1565C0';
fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(rec)
})
.then(function(){
statusBox.textContent = 'Synced!';
statusBox.style.background = '#d4edda';
statusBox.style.color = '#155724';
setTimeout(function(){
statusBox.textContent = 'Ready to scan';
}, 2000);
})
.catch(function(){
statusBox.textContent = 'Saved locally';
statusBox.style.background = '#fff3cd';
statusBox.style.color = '#856404';
setTimeout(function(){
statusBox.textContent = 'Ready to scan';
statusBox.style.background = '#d4edda';
statusBox.style.color = '#155724';
}, 3000);
});
}

function refreshDisplay(){
document.getElementById('count').textContent = totalCount;
var logBox = document.getElementById('log');
if(dataList.length === 0){
logBox.innerHTML = '<p style="text-align:center;color:#999;padding:20px">No scans yet</p>';
return;
}
var htmlStr = '';
var maxShow = dataList.length < 10 ? dataList.length : 10;
for(var idx = 0; idx < maxShow; idx++){
var item = dataList[idx];
htmlStr += '<div class="log-entry">';
htmlStr += '<p><strong>' + item.name + '</strong></p>';
htmlStr += '<p>Email: ' + item.email + '</p>';
htmlStr += '<p>Time: ' + item.time + '</p>';
htmlStr += '</div>';
}
logBox.innerHTML = htmlStr;
}

function doExport(){
if(dataList.length === 0){
alert('No data');
return;
}
var csvText = 'Event,Name,Email,Time
';
for(var idx = 0; idx < dataList.length; idx++){
var item = dataList[idx];
csvText += '"' + item.event + '","' + item.name + '","' + item.email + '","' + item.time + '"
';
}
var fileBlob = new Blob([csvText], {type: 'text/csv'});
var fileUrl = URL.createObjectURL(fileBlob);
var linkEl = document.createElement('a');
linkEl.href = fileUrl;
linkEl.download = 'Attendance.csv';
document.body.appendChild(linkEl);
linkEl.click();
document.body.removeChild(linkEl);
URL.revokeObjectURL(fileUrl);
alert('Exported ' + dataList.length + ' records');
}

function doClear(){
if(confirm('Clear data?')){
dataList = [];
totalCount = 0;
localStorage.removeItem('attendance');
refreshDisplay();
alert('Cleared');
}
}

console.log('Ready!');
</script>
</body>
</html>
