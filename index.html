<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Annual Gathering 2026</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;margin:0}
.box{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin:0 0 10px}
.event{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.event h2{margin:0 0 10px;font-size:2em}
input{width:100%;padding:18px;font-size:18px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;margin:15px 0;box-sizing:border-box}
input:focus{outline:none;border-color:#5568d3;box-shadow:0 0 0 3px rgba(102,126,234,0.2)}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;text-align:center;margin:15px 0}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none}
.result h3{color:#155724;margin:0 0 15px}
.result p{margin:8px 0;font-size:16px}
.count{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:10px;text-align:center;margin:20px 0}
.count .num{font-size:3em;font-weight:bold;margin:0}
.count .label{font-size:1em;opacity:0.9;margin:10px 0 0}
button{padding:12px 25px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:16px;margin:5px}
.btn-export{background:#28a745;color:#fff}
.btn-export:hover{background:#218838}
.btn-clear{background:#dc3545;color:#fff}
.btn-clear:hover{background:#c82333}
.log{background:#f8f9fa;padding:15px;border-radius:10px;max-height:300px;overflow-y:auto;margin:15px 0}
.entry{background:#fff;padding:12px;margin:8px 0;border-radius:6px;border-left:4px solid #667eea}
.entry p{margin:4px 0;color:#555;font-size:14px}
</style>
</head>
<body>
<div class="box">
<h1>📱 QR Attendance Scanner</h1>

<div class="event">
<h2>📅 Annual Gathering 2026</h2>
<p>Scan QR Code or Type Name</p>
</div>

<input type="text" id="input" placeholder="Scan QR code or type name..." autofocus>
<div class="status" id="status">Ready to scan</div>

<div class="result" id="result">
<h3>✅ Attendance Recorded!</h3>
<p><strong>Name:</strong> <span id="rName"></span></p>
<p><strong>Email:</strong> <span id="rEmail"></span></p>
<p><strong>Time:</strong> <span id="rTime"></span></p>
</div>

<div class="count">
<div class="num" id="count">0</div>
<div class="label">Total Scanned</div>
</div>

<div style="text-align:center;margin:20px 0">
<button class="btn-export" onclick="exportCSV()">📥 Export to CSV</button>
<button class="btn-clear" onclick="clearAll()">🗑️ Clear All</button>
</div>

<h3 style="color:#333;margin:20px 0 10px">Recent Scans:</h3>
<div class="log" id="log">No scans yet</div>
</div>

<script>
let data = [];
let count = 0;

const saved = localStorage.getItem('attendance');
if (saved) {
data = JSON.parse(saved);
count = data.length;
updateDisplay();
}

const input = document.getElementById('input');
const status = document.getElementById('status');

input.focus();
document.addEventListener('click', () => input.focus());

input.addEventListener('input', () => {
status.textContent = 'Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';
});

input.addEventListener('keypress', function(e) {
if (e.key === 'Enter') {
e.preventDefault();
const text = this.value.trim();
if (text) {
process(text);
this.value = '';
}
this.focus();
}
});

function process(text) {
console.log('Processing:', text);

let name = '';
let email = '';

try {
const json = JSON.parse(text);
name = json.name || '';
email = json.email || '';
} catch(e) {
if (text.includes(',')) {
const parts = text.split(',');
name = parts[0].trim();
email = parts[1].trim();
} else {
name = text;
email = 'N/A';
}
}

save(name, email);
}

function save(name, email) {
const time = new Date().toLocaleString('en-SG');

const record = {
event: 'Annual Gathering 2026',
name: name,
email: email,
time: time
};

data.unshift(record);
localStorage.setItem('attendance', JSON.stringify(data));

document.getElementById('rName').textContent = name;
document.getElementById('rEmail').textContent = email;
document.getElementById('rTime').textContent = time;
document.getElementById('result').style.display = 'block';

setTimeout(() => {
document.getElementById('result').style.display = 'none';
}, 5000);

count = data.length;
updateDisplay();

status.textContent = '✅ Recorded successfully!';
status.style.background = '#d4edda';
status.style.color = '#155724';

setTimeout(() => {
status.textContent = 'Ready to scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
}, 2000);

console.log('Saved:', record);
}

function updateDisplay() {
document.getElementById('count').textContent = count;

const logDiv = document.getElementById('log');

if (data.length === 0) {
logDiv.innerHTML = '<p style="text-align:center;color:#999;padding:15px">No scans yet</p>';
return;
}

let html = '';
data.slice(0, 10).forEach(record => {
html += `
<div class="entry">
<p><strong>\\${record.name}</strong></p>
<p>Email: \\${record.email}</p>
<p>Time: \\${record.time}</p>
</div>
`;
});

logDiv.innerHTML = html;
}

function exportCSV() {
if (data.length === 0) {
alert('No data to export');
return;
}

let csv = 'Event,Name,Email,Timestamp
';
data.forEach(record => {
csv += `"\\${record.event}","\\${record.name}","\\${record.email}","\\${record.time}"
`;
});

const blob = new Blob([csv], { type: 'text/csv' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'Annual_Gathering_2026_Attendance.csv';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);

alert('Exported ' + data.length + ' records to CSV');
}

function clearAll() {
if (confirm('Clear all attendance records? This cannot be undone.')) {
data = [];
count = 0;
localStorage.removeItem('attendance');
updateDisplay();
alert('All data cleared');
}
}

console.log('Scanner ready!');
</script>
</body>
</html>
