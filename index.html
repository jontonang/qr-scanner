<!DOCTYPE html>
<html>
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
<title>Annual Gathering 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin-bottom:10px;font-size:2em}
.event-box{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.event-box h2{font-size:2em;margin-bottom:10px}
.event-box p{font-size:1.1em;opacity:0.9}
.input-section{margin:20px 0}
#nameInput{width:100%;padding:20px;font-size:20px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;font-family:monospace}
#nameInput:focus{outline:none;border-color:#5568d3;box-shadow:0 0 0 3px rgba(102,126,234,0.2)}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;text-align:center;margin:15px 0;font-size:16px}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none;animation:slideIn 0.5s}
@keyframes slideIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.result h3{color:#155724;margin-bottom:15px;font-size:1.5em}
.result p{margin:10px 0;font-size:16px}
.result strong{color:#667eea}
.stats{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.stat-number{font-size:4em;font-weight:bold;margin-bottom:10px}
.stat-label{font-size:1.2em;opacity:0.9}
.buttons{text-align:center;margin:20px 0}
button{padding:12px 25px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:16px;margin:5px;transition:0.3s}
.btn-export{background:#28a745;color:#fff}
.btn-export:hover{background:#218838;transform:translateY(-2px)}
.btn-clear{background:#dc3545;color:#fff}
.btn-clear:hover{background:#c82333;transform:translateY(-2px)}
.log-section{margin-top:30px}
.log-section h3{color:#333;margin-bottom:15px}
.log{background:#f8f9fa;padding:15px;border-radius:10px;max-height:350px;overflow-y:auto}
.log-entry{background:#fff;padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid #667eea;transition:0.3s}
.log-entry:hover{transform:translateX(5px);box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.log-entry p{margin:5px 0;color:#555;font-size:14px}
.log-entry strong{color:#333}
.no-data{text-align:center;color:#999;padding:30px;font-style:italic}
.pulse{display:inline-block;width:12px;height:12px;background:#28a745;border-radius:50%;margin-right:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
</style>
</head>
<body>
<div class=\"container\">
<h1>📱 QR Attendance Scanner</h1>

<div class=\"event-box\">
<h2>📅 Annual Gathering 2026</h2>
<p>Auto-Scan Mode - Scan Submit</p>
</div>

<div class=\"input-section\">
<input type=\"text\" id=\"nameInput\" placeholder=\"Ready scan...\" autofocus>
<div class=\"status\" id=\"status\"><span class=\"pulse\"></span>Ready scan</div>
</div>

<div class=\"result\" id=\"result\">
<h3>✅ Attendance Recorded!</h3>
<p><strong>Name:</strong> <span id=\"resultName\"></span></p>
<p><strong>Email:</strong> <span id=\"resultEmail\"></span></p>
<p><strong>Time:</strong> <span id=\"resultTime\"></span></p>
</div>

<div class=\"stats\">
<div class=\"stat-number\" id=\"totalCount\">0</div>
<div class=\"stat-label\">Total Scanned</div>
</div>

<div class=\"buttons\">
<button class=\"btn-export\" onclick=\"exportCSV()\">📥 Export CSV</button>
<button class=\"btn-clear\" onclick=\"clearAll()\">🗑️ Clear All</button>
</div>

<div class=\"log-section\">
<h3>Recent Scans:</h3>
<div class=\"log\" id=\"logContainer\">
<p class=\"no-data\">No scans yet</p>
</div>
</div>
</div>

<script>
let attendanceData = [];
let totalCount = 0;
let lastScan = '';
let lastScanTime = 0;
let scanTimeout;

// Load saved data
const savedData = localStorage.getItem('attendance');
if (savedData) {
try {
attendanceData = JSON.parse(savedData);
totalCount = attendanceData.length;
updateDisplay();
} catch(e) {
console.error('Error loading data:', e);
}
}

const input = document.getElementById('nameInput');
const status = document.getElementById('status');

// Auto-focus input
input.focus();
document.addEventListener('click', () => input.focus());

// AUTO-SUBMIT: Detect scanner input
input.addEventListener('input', function() {
// Clear previous timeout
clearTimeout(scanTimeout);

// Show scanning status
status.innerHTML = '<span class=\"pulse\"></span>Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';

// Wait 100ms typing stops (scanner fast)
scanTimeout = setTimeout(() => {
const scannedData = input.value.trim();

if (scannedData) {
// Auto-submit
autoSubmit(scannedData);
}
}, 100);
});

// Also support manual Enter key
input.addEventListener('keypress', function(e) {
if (e.key === 'Enter') {
e.preventDefault();
clearTimeout(scanTimeout);
const data = input.value.trim();
if (data) {
autoSubmit(data);
}
}
});

// Auto-submit function
function autoSubmit(text) {
const currentTime = Date.now();

// Prevent duplicate scans (within 2 seconds)
if (text === lastScan && (currentTime - lastScanTime) < 2000) {
console.log('Duplicate scan ignored');
input.value = '';
status.innerHTML = '<span class=\"pulse\"></span>Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
return;
}

lastScan = text;
lastScanTime = currentTime;

status.innerHTML = '⚡ Processing...';
status.style.background = '#fff3cd';
status.style.color = '#856404';

processData(text);
input.value = '';
input.focus();
}

// Process data
function processData(text) {
console.log('Processing:', text);

let name = '';
let email = '';

// Try parse JSON
try {
const json = JSON.parse(text);
name = json.name || '';
email = json.email || '';
} catch(e) {
// JSON - check comma-separated
if (text.includes(',')) {
const parts = text.split(',').map(p => p.trim());
name = parts[0] || 'Unknown';
email = parts[1] || 'N/A';
} else {
// name
name = text;
email = 'N/A';
}
}

if (!name) {
status.innerHTML = '<span class=\"pulse\"></span>Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
return;
}

saveRecord(name, email);
}

// Save record
function saveRecord(name, email) {
const = new Date();
const record = {
event: 'Annual Gathering 2026',
name: name,
email: email,
time: now.toLocaleString('en-SG'),
timestamp: now.toISOString()
};

attendanceData.unshift(record);
localStorage.setItem('attendance', JSON.stringify(attendanceData));

// Show result
document.getElementById('resultName').textContent = name;
document.getElementById('resultEmail').textContent = email;
document.getElementById('resultTime').textContent = record.time;
document.getElementById('result').style.display = 'block';

setTimeout(() => {
document.getElementById('result').style.display = 'none';
}, 4000);

// Update count
totalCount = attendanceData.length;
updateDisplay();

// Update status
status.innerHTML = '✅ Recorded successfully!';
status.style.background = '#d4edda';
status.style.color = '#155724';

setTimeout(() => {
status.innerHTML = '<span class=\"pulse\"></span>Ready scan';
}, 2000);

console.log('Saved:', record);
}

// Update display
function updateDisplay() {
document.getElementById('totalCount').textContent = totalCount;

const logContainer = document.getElementById('logContainer');

if (attendanceData.length === 0) {
logContainer.innerHTML = '<p class=\"no-data\">No scans yet</p>';
return;
}

let html = '';
attendanceData.slice(0, 15).forEach(record => {
html += `
<div class=\"log-entry\">
<p><strong>\\\${record.name}</strong></p>
<p>Email: \\\${record.email}</p>
<p>Time: \\\${record.time}</p>
</div>
`;
});

logContainer.innerHTML = html;
}

// Export CSV
function exportCSV() {
if (attendanceData.length === 0) {
alert('No data export');
return;
}

let csv = 'Event,Name,Email,Timestamp
';
attendanceData.forEach(record => {
csv += `\\\"\\\${record.event}\\\",\\\"\\\${record.name}\\\",\\\"\\\${record.email}\\\",\\\"\\\${record.time}\\\"
`;
});

const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
const url = URL.createObjectURL(blob);
const link = document.createElement('a');
link.href = url;
link.download = 'Annual_Gathering_2026_Attendance.csv';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
URL.revokeObjectURL(url);

alert('Exported ' + attendanceData.length + ' records CSV');
}

// Clear all
function clearAll() {
if (confirm('Clear attendance records? cannot undone.')) {
attendanceData = [];
totalCount = 0;
localStorage.removeItem('attendance');
updateDisplay();
alert('All data cleared');
}
}

console.log('Auto-Scan Mode: Scanner ready!');
console.log('Loaded', totalCount, 'existing records');
</script>
</body>
</html>
