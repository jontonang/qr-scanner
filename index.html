<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Gathering 2026 - Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 QR Attendance Scanner</h1>
            <p>NCS Event Management System</p>
        </header>

        <div class="event-display">
            <h2>📅 Annual Gathering 2026</h2>
            <p class="event-subtitle">Attendance Registration</p>
        </div>

        <div class="scanner-section">
            <h3>🔍 Scan or Enter Name</h3>
            <input type="text" id="qrInput" placeholder="Type name and press Enter" autofocus>
            <div class="scan-status" id="scanStatus">Ready to scan</div>
        </div>

        <div class="result" id="result" style="display:none;">
            <h2>✅ Attendance Recorded!</h2>
            <p><strong>Name:</strong> <span id="resultName"></span></p>
            <p><strong>Email:</strong> <span id="resultEmail"></span></p>
            <p><strong>Time:</strong> <span id="resultTime"></span></p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Attendees</div>
            </div>
        </div>

        <div class="log-section">
            <h3>Recent Scans</h3>
            <button onclick="exportCSV()" class="btn-export">📥 Export CSV</button>
            <button onclick="clearAll()" class="btn-clear">🗑️ Clear All</button>
            <div id="logContainer">No scans yet</div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
