<script>
var SCRIPT_URL = '[https://script.google.com/macros/s/AKfycbw-rszpjsd8KOfeiX2oQbQYL2ELxbJkh6QxJoib-i7fTFRqzlciDvkYXjNxipVg8hiSug/exec]';
var data = [];
var count = 0;
var timeout;
var lastScan = '';
var lastTime = 0;

var saved = localStorage.getItem('attendance');
if(saved){
try{
data = JSON.parse(saved);
count = data.length;
update();
}catch(e){}
}

var input = document.getElementById('scanInput');
var status = document.getElementById('status');

input.focus();
document.addEventListener('click', function(){
input.focus();
});

input.addEventListener('input', function(){
clearTimeout(timeout);
status.textContent = 'Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';
timeout = setTimeout(function(){
var text = input.value.trim();
if(text){
submit(text);
}
}, 100); // ← CHANGED 200 100
});

input.addEventListener('keypress', function(e){
if(e.key === 'Enter'){
e.preventDefault();
clearTimeout(timeout);
var text = input.value.trim();
if(text){
submit(text);
}
}
});

function submit(text){
var = Date.now();
if(text === lastScan && (now - lastTime) < 2000){
input.value = '';
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
return;
}
lastScan = text;
lastTime = now;
var name = '';
var email = '';
try{
var json = JSON.parse(text);
name = json.name || '';
email = json.email || '';
}catch(e){
if(text.indexOf(',') > -1){
var parts = text.split(',');
name = parts[0].trim();
email = parts[1] ? parts[1].trim() : 'N/A';
}else{
name = text;
email = 'N/A';
}
}
if(!name){
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
input.value = '';
return;
}
save(name, email);
input.value = '';
}

function save(name, email){
var = new Date();
var record = {
event: 'Annual Gathering 2026',
name: name,
email: email,
time: now.toLocaleString('en-SG')
};
data.unshift(record);
localStorage.setItem('attendance', JSON.stringify(data));
count = data.length;
document.getElementById('rName').textContent = name;
document.getElementById('rEmail').textContent = email;
document.getElementById('rTime').textContent = record.time;
document.getElementById('result').style.display = 'block';
setTimeout(function(){
document.getElementById('result').style.display = 'none';
}, 4000);
update();
status.textContent = 'Syncing...';
status.style.background = '#e7f3ff';
status.style.color = '#1565C0';
fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(record)
})
.then(function(){
status.textContent = 'Synced!';
status.style.background = '#d4edda';
status.style.color = '#155724';
setTimeout(function(){
status.textContent = 'Ready scan';
}, 2000);
})
.catch(function(){
status.textContent = 'Saved locally';
status.style.background = '#fff3cd';
status.style.color = '#856404';
setTimeout(function(){
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
}, 3000);
});
}

function update(){
document.getElementById('count').textContent = count;
var logDiv = document.getElementById('log');
if(data.length === 0){
logDiv.innerHTML = '<p style=\"text-align:center;color:#999;padding:20px\">No scans yet</p>';
return;
}
var html = '';
for(var = 0; < Math.min(data.length, 10); i++){
var r = data[i];
html += '<div class=\"log-entry\">';
html += '<p><strong>' + r.name + '</strong></p>';
html += '<p>Email: ' + r.email + '</p>';
html += '<p>Time: ' + r.time + '</p>';
html += '</div>';
}
logDiv.innerHTML = html;
}

function exportCSV(){
if(data.length === 0){
alert('No data');
return;
}
var csv = 'Event,Name,Email,Time
';
for(var = 0; < data.length; i++){
var r = data[i];
csv += '\"' + r.event + '\",\"' + r.name + '\",\"' + r.email + '\",\"' + r.time + '\"
';
}
var blob = new Blob([csv], {type: 'text/csv'});
var url = URL.createObjectURL(blob);
var = document.createElement('a');
a.href = url;
a.download = 'Attendance.csv';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
alert('Exported ' + data.length + ' records');
}

function clearAll(){
if(confirm('Clear data?')){
data = [];
count = 0;
localStorage.removeItem('attendance');
update();
alert('Cleared');
}
}

console.log('Ready!');
</script>
