<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event QR Attendance Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Event Attendance Scanner</h1>
            <p>Scan QR codes to record attendance</p>
        </header>

        <!-- Event Selection -->
        <div class="event-selection">
            <label for="eventSelect">Select Event:</label>
            <select id="eventSelect">
                <option value="">-- Choose Event --</option>
                <option value="Tech Conference 2024">Tech Conference 2024</option>
                <option value="Annual Dinner">Annual Dinner</option>
                <option value="Workshop Session">Workshop Session</option>
            </select>
        </div>

        <!-- QR Scanner Area -->
        <div class="scanner-container">
            <div id="qr-reader"></div>
            <button id="startScanBtn" class="btn-primary">Start Scanner</button>
            <button id="stopScanBtn" class="btn-secondary" style="display:none;">Stop Scanner</button>
        </div>

        <!-- Display Scanned Result -->
        <div id="result-container" style="display:none;">
            <div class="success-message">
                <h2>✅ Attendance Recorded!</h2>
                <div class="attendee-info">
                    <p><strong>Name:</strong> <span id="attendee-name"></span></p>
                    <p><strong>Email:</strong> <span id="attendee-email"></span></p>
                    <p><strong>Time:</strong> <span id="scan-time"></span></p>
                </div>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="status-message"></div>

        <!-- Attendance Log -->
        <div class="attendance-log">
            <h3>Recent Scans</h3>
            <div id="log-container">
                <p class="no-data">No scans yet</p>
            </div>
        </div>
    </div>

    <!-- Include QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <!-- Include Microsoft Graph SDK (for Excel integration) -->
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    
    <!-- Your custom scripts -->
    <script src="config.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
