<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event QR Attendance Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Event Attendance Scanner</h1>
            <p>Scan QR codes to record attendance</p>
        </header>

        <!-- Event Selection -->
        <div class="event-selection">
            <label for="eventSelect">Select Event:</label>
            <select id="eventSelect">
                <option value="">-- Choose Event --</option>
                <option value="Tech Conference 2026">Tech Conference 2024</option>
                <option value="Annual Dinner 2026">Annual Dinner</option>
                <option value="Workshop Session">Workshop Session</option>
            </select>
        </div>

        <!-- QR Scanner Area -->
       <!-- Remove or hide the camera scanner section -->
<!-- Add this new section instead -->

<div class="scanner-input-section">
    <h2>🔍 Scan Attendee QR Code</h2>
    <p class="instruction">Point your scanner at the QR code on the attendee's badge</p>
    
    <div class="input-container">
        <input type="text" 
               id="qrInput" 
               placeholder="Ready to scan... (or type manually)" 
               autofocus 
               autocomplete="off">
        <div class="scan-indicator" id="scanIndicator">
            <span class="pulse"></span>
            Ready to Scan
        </div>
    </div>
    
    <div class="quick-actions">
        <button onclick="clearInput()" class="btn-secondary">Clear</button>
        <button onclick="manualSubmit()" class="btn-primary">Submit Manually</button>
    </div>
</div>
        <!-- Status Messages -->
        <div id="status-message"></div>

        <!-- Attendance Log -->
        <div class="attendance-log">
            <h3>Recent Scans</h3>
            <div id="log-container">
                <p class="no-data">No scans yet</p>
            </div>
        </div>
    </div>

    <!-- Include QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <!-- Include Microsoft Graph SDK (for Excel integration) -->
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    
    <!-- Your custom scripts -->
    <script src="config.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
