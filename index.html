<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Annual Gathering 2026</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;margin:0}
.box{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin:0 0 10px}
.event{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.event h2{margin:0 0 10px;font-size:2em}
input{width:100%;padding:18px;font-size:18px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;margin:15px 0;box-sizing:border-box}
input:focus{outline:none;border-color:#5568d3;box-shadow:0 0 0 3px rgba(102,126,234,0.2)}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;text-align:center;margin:15px 0}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none}
.result h3{color:#155724;margin:0 0 15px}
.result p{margin:8px 0;font-size:16px}
.count{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:10px;text-align:center;margin:20px 0}
.count .num{font-size:3em;font-weight:bold;margin:0}
.count .label{font-size:1em;opacity:0.9;margin:10px 0 0}
</style>
</head>
<body>
<div class="box">
<h1>📱 QR Attendance Scanner</h1>

<div class="event">
<h2>📅 Annual Gathering 2026</h2>
<p>Scan QR Code Type Name</p>
</div>

<input type="text" id="input" placeholder="Scan QR code type name..." autofocus>
<div class="status" id="status">Ready scan</div>

<div class="result" id="result">
<h3>✅ Saved Google Sheets!</h3>
<p><strong>Name:</strong> <span id="rName"></span></p>
<p><strong>Email:</strong> <span id="rEmail"></span></p>
<p><strong>Time:</strong> <span id="rTime"></span></p>
</div>

<div class="count">
<div class="num" id="count">0</div>
<div class="label">Total Scanned</div>
</div>
</div>

<script>
// PASTE GOOGLE APPS SCRIPT URL HERE
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1U2v356uVDrm4nYrWypTUSyg8BotxrTt7SVCGrb4f30U6twqvijGQse_ljy84sfjLMQ/exec';

let count = parseInt(localStorage.getItem('count')) || 0;
document.getElementById('count').textContent = count;

const input = document.getElementById('input');
const status = document.getElementById('status');

input.focus();
document.addEventListener('click', () => input.focus());

input.addEventListener('input', () => {
status.textContent = 'Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';
});

input.addEventListener('keypress', function(e) {
if (e.key === 'Enter') {
e.preventDefault();
const data = this.value.trim();
if (data) {
process(data);
this.value = '';
}
this.focus();
}
});

function process(data) {
console.log('Processing:', data);

let name = '';
let email = '';

try {
const json = JSON.parse(data);
name = json.name || '';
email = json.email || '';
} catch(e) {
if (data.includes(',')) {
const parts = data.split(',');
name = parts[0].trim();
email = parts[1].trim();
} else {
name = data;
email = 'N/A';
}
}

save(name, email);
}

async function save(name, email) {
const time = new Date().toLocaleString('en-SG');

status.textContent = '💾 Saving Google Sheets...';
status.style.background = '#fff3cd';
status.style.color = '#856404';

try {
await fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({name: name, email: email, time: time})
});

document.getElementById('rName').textContent = name;
document.getElementById('rEmail').textContent = email;
document.getElementById('rTime').textContent = time;
document.getElementById('result').style.display = 'block';

setTimeout(() => {
document.getElementById('result').style.display = 'none';
}, 5000);

count++;
localStorage.setItem('count', count);
document.getElementById('count').textContent = count;

status.textContent = '✅ Saved successfully!';
status.style.background = '#d4edda';
status.style.color = '#155724';

setTimeout(() => {
status.textContent = 'Ready scan';
}, 2000);

console.log('Saved:', name, email);
} catch (error) {
console.error('Error:', error);
status.textContent = '⚠️ Error - try again';
status.style.background = '#f8d7da';
status.style.color = '#721c24';
}
}

console.log('Scanner ready');
</script>
</body>
</html>
