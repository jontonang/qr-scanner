<!DOCTYPE html>
<html lang=\"en\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
<title>Annual Gathering 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin-bottom:20px;font-size:2em}
.event-box{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:25px;border-radius:12px;text-align:center;margin-bottom:25px}
.event-box h2{font-size:2em;margin-bottom:10px}
.event-box p{font-size:1.1em;opacity:0.9}
.input-section{margin:20px 0}
#scanInput{width:100%;padding:20px;font-size:20px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;box-sizing:border-box}
#scanInput:focus{outline:none;border-color:#5568d3;box-shadow:0 0 0 3px rgba(102,126,234,0.2)}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;text-align:center;margin:15px 0;font-size:16px}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none}
.result h3{color:#155724;margin-bottom:15px}
.result p{margin:10px 0;font-size:16px}
.result strong{color:#667eea}
.stats{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.stat-number{font-size:4em;font-weight:bold;margin-bottom:10px}
.stat-label{font-size:1.2em;opacity:0.9}
button{width:100%;padding:15px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:18px;margin:8px 0;transition:0.3s}
.btn-export{background:#28a745;color:#fff}
.btn-export:hover{background:#218838;transform:translateY(-2px)}
.btn-clear{background:#dc3545;color:#fff}
.btn-clear:hover{background:#c82333;transform:translateY(-2px)}
.log-section{margin-top:30px}
.log-section h3{color:#333;margin-bottom:15px}
.log{background:#f8f9fa;padding:15px;border-radius:10px;max-height:350px;overflow-y:auto}
.log-entry{background:#fff;padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid #667eea}
.log-entry p{margin:5px 0;color:#555;font-size:14px}
.log-entry strong{color:#333}
.no-data{text-align:center;color:#999;padding:30px;font-style:italic}
</style>
</head>
<body>
<div class=\"container\">
<h1>📱 QR Attendance Scanner</h1>

<div class=\"event-box\">
<h2>📅 Annual Gathering 2026</h2>
<p>Auto-Scan Mode</p>
</div>

<div class=\"input-section\">
<input type=\"text\" id=\"scanInput\" placeholder=\"Ready scan...\" autofocus autocomplete=\"off\">
<div class=\"status\" id=\"status\">Ready scan</div>
</div>

<div class=\"result\" id=\"result\">
<h3>✅ Saved Google Sheets!</h3>
<p><strong>Name:</strong> <span id=\"resultName\"></span></p>
<p><strong>Email:</strong> <span id=\"resultEmail\"></span></p>
<p><strong>Time:</strong> <span id=\"resultTime\"></span></p>
</div>

<div class=\"stats\">
<div class=\"stat-number\" id=\"totalCount\">0</div>
<div class=\"stat-label\">Total Scanned</div>
</div>

<div class=\"buttons\">
<button class=\"btn-export\" onclick=\"exportCSV()\">📥 Export CSV</button>
<button class=\"btn-clear\" onclick=\"clearAll()\">🗑️ Clear All</button>
</div>

<div class=\"log-section\">
<h3>📋 Recent Scans:</h3>
<div class=\"log\" id=\"logContainer\">
<p class=\"no-data\">No scans yet</p>
</div>
</div>
</div>

<script>
var SCRIPT_URL = '[https://script.google.com/macros/s/AKfycbw-rszpjsd8KOfeiX2oQbQYL2ELxbJkh6QxJoib-i7fTFRqzlciDvkYXjNxipVg8hiSug/exec] attendanceData = [];
var totalCount = 0;
var scanTimeout;
var lastScan = '';
var lastScanTime = 0;

var savedData = localStorage.getItem('attendance');
if(savedData){
try{
attendanceData = JSON.parse(savedData);
totalCount = attendanceData.length;
updateDisplay();
}catch(e){
console.error('Load error:', e);
}
}

var input = document.getElementById('scanInput');
var status = document.getElementById('status');

input.focus();
document.addEventListener('click', function(){
setTimeout(function(){
input.focus();
}, 100);
});

input.addEventListener('input', function(){
clearTimeout(scanTimeout);
status.textContent = 'Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';
scanTimeout = setTimeout(function(){
var text = input.value.trim();
if(text){
autoSubmit(text);
}
}, 100);
});

input.addEventListener('keypress', function(e){
if(e.key === 'Enter'){
e.preventDefault();
clearTimeout(scanTimeout);
var text = input.value.trim();
if(text){
autoSubmit(text);
}
}
});

function autoSubmit(text){
var currentTime = Date.now();
if(text === lastScan && (currentTime - lastScanTime) < 2000){
console.log('Duplicate ignored');
input.value = '';
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
return;
}
lastScan = text;
lastScanTime = currentTime;
status.textContent = 'Processing...';
status.style.background = '#fff3cd';
status.style.color = '#856404';
processData(text);
input.value = '';
input.focus();
}

function processData(text){
console.log('Processing:', text);
var name = '';
var email = '';
try{
var json = JSON.parse(text);
name = json.name || '';
email = json.email || '';
}catch(e){
if(text.indexOf(',') > -1){
var parts = text.split(',');
name = parts[0].trim();
email = parts[1] ? parts[1].trim() : 'N/A';
}else{
name = text;
email = 'N/A';
}
}
if(!name){
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
return;
}
saveRecord(name, email);
}

function saveRecord(name, email){
var = new Date();
var record = {
event: 'Annual Gathering 2026',
name: name,
email: email,
time: now.toLocaleString('en-SG'),
timestamp: now.toISOString()
};
attendanceData.unshift(record);
localStorage.setItem('attendance', JSON.stringify(attendanceData));
totalCount = attendanceData.length;
document.getElementById('resultName').textContent = name;
document.getElementById('resultEmail').textContent = email;
document.getElementById('resultTime').textContent = record.time;
document.getElementById('result').style.display = 'block';
setTimeout(function(){
document.getElementById('result').style.display = 'none';
}, 4000);
updateDisplay();
syncToGoogleSheets(record);
console.log('Saved:', record);
}

function syncToGoogleSheets(record){
status.textContent = 'Syncing...';
status.style.background = '#e7f3ff';
status.style.color = '#1565C0';
fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(record)
})
.then(function(){
status.textContent = 'Synced!';
status.style.background = '#d4edda';
status.style.color = '#155724';
setTimeout(function(){
status.textContent = 'Ready scan';
}, 2000);
console.log('Synced');
})
.catch(function(error){
console.error('Sync error:', error);
status.textContent = 'Saved locally';
status.style.background = '#fff3cd';
status.style.color = '#856404';
setTimeout(function(){
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
}, 3000);
});
}

function updateDisplay(){
document.getElementById('totalCount').textContent = totalCount;
var logContainer = document.getElementById('logContainer');
if(attendanceData.length === 0){
logContainer.innerHTML = '<p class=\"no-data\">No scans yet</p>';
return;
}
var html = '';
for(var = 0; < Math.min(attendanceData.length, 15); i++){
var r = attendanceData[i];
html += '<div class=\"log-entry\">';
html += '<p><strong>' + r.name + '</strong></p>';
html += '<p>Email: ' + r.email + '</p>';
html += '<p>Time: ' + r.time + '</p>';
html += '</div>';
}
logContainer.innerHTML = html;
}

function exportCSV(){
if(attendanceData.length === 0){
alert('No data export');
return;
}
var csv = 'Event,Name,Email,Timestamp
';
for(var = 0; < attendanceData.length; i++){
var r = attendanceData[i];
csv += '\"' + r.event + '\",\"' + r.name + '\",\"' + r.email + '\",\"' + r.time + '\"
';
}
var blob = new Blob([csv], {type: 'text/csv'});
var url = URL.createObjectURL(blob);
var link = document.createElement('a');
link.href = url;
link.download = 'Annual_Gathering_2026_Attendance.csv';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
URL.revokeObjectURL(url);
alert('Exported ' + attendanceData.length + ' records');
}

function clearAll(){
if(confirm('Clear local data?

Google Sheets data safe.')){
attendanceData = [];
totalCount = 0;
localStorage.removeItem('attendance');
updateDisplay();
alert('Cleared');
}
}

console.log('Scanner ready!');
console.log('Records:', totalCount);
</script>
</body>
</html>
