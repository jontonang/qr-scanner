<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Annual Gathering 2026</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;margin:0}
.box{max-width:600px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin-bottom:20px}
.event{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:10px;text-align:center;margin-bottom:20px}
.event h2{margin:0 0 10px;font-size:1.8em}
input{width:100%;padding:20px;font-size:20px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;margin:15px 0;box-sizing:border-box}
input:focus{outline:none;border-color:#5568d3}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;text-align:center;margin:15px 0;font-weight:bold}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none}
.result h3{color:#155724;margin:0 0 15px}
.result p{margin:8px 0}
.count{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:10px;text-align:center;margin:20px 0}
.count .num{font-size:3em;font-weight:bold}
.count .label{font-size:1em;margin-top:10px}
button{width:100%;padding:15px;font-size:18px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin:5px 0}
.btn-export{background:#28a745;color:#fff}
.btn-clear{background:#dc3545;color:#fff}
.log{background:#f8f9fa;padding:15px;border-radius:10px;max-height:300px;overflow-y:auto;margin-top:15px}
.entry{background:#fff;padding:12px;margin:8px 0;border-radius:6px;border-left:4px solid #667eea}
.entry p{margin:4px 0;color:#555;font-size:14px}
</style>
</head>
<body>
<div class="box">
<h1>📱 QR Attendance Scanner</h1>

<div class="event">
<h2>📅 Annual Gathering 2026</h2>
<p>Auto-Scan Mode</p>
</div>

<input type="text" id="input" placeholder="Ready to scan..." autofocus>
<div class="status" id="status">Ready to scan</div>

<div class="result" id="result">
<h3>✅ Recorded!</h3>
<p><strong>Name:</strong> <span id="rName"></span></p>
<p><strong>Email:</strong> <span id="rEmail"></span></p>
<p><strong>Time:</strong> <span id="rTime"></span></p>
</div>

<div class="count">
<div class="num" id="count">0</div>
<div class="label">Total Scanned</div>
</div>

<button class="btn-export" id="btnExport">📥 Export CSV</button>
<button class="btn-clear" id="btnClear">🗑️ Clear All</button>

<h3 style="color:#333;margin:20px 0 10px">Recent Scans:</h3>
<div class="log" id="log">No scans yet</div>
</div>

<script>
// PASTE YOUR GOOGLE APPS SCRIPT URL HERE
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-rszpjsd8KOfeiX2oQbQYL2ELxbJkh6QxJoib-i7fTFRqzlciDvkYXjNxipVg8hiSug/exec';

var data = [];
var count = 0;
var timeout;

// Load saved data
var saved = localStorage.getItem('attendance');
if (saved) {
try {
data = JSON.parse(saved);
count = data.length;
updateDisplay();
} catch(e) {}
}

var input = document.getElementById('input');
var status = document.getElementById('status');

// Auto-focus
input.focus();
document.addEventListener('click', function() {
input.focus();
});

// Auto-submit when typing stops
input.addEventListener('input', function() {
clearTimeout(timeout);
status.textContent = 'Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';

timeout = setTimeout(function() {
var text = input.value.trim();
if (text) {
submit(text);
}
}, 200);
});

// Also support Enter key
input.addEventListener('keypress', function(e) {
if (e.key === 'Enter') {
e.preventDefault();
clearTimeout(timeout);
var text = input.value.trim();
if (text) {
submit(text);
}
}
});

// Submit function
function submit(text) {
console.log('Processing:', text);

var name = '';
var email = '';

// Try parse JSON
try {
var json = JSON.parse(text);
name = json.name || '';
email = json.email || '';
} catch(e) {
// Not JSON - check comma
if (text.indexOf(',') > -1) {
var parts = text.split(',');
name = parts[0].trim();
email = parts[1].trim();
} else {
name = text;
email = 'N/A';
}
}

if (!name) {
status.textContent = 'Ready to scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
input.value = '';
return;
}

save(name, email);
input.value = '';
input.focus();
}

// Save record
function save(name, email) {
var now = new Date();
var record = {
event: 'Annual Gathering 2026',
name: name,
email: email,
time: now.toLocaleString('en-SG')
};

data.unshift(record);
localStorage.setItem('attendance', JSON.stringify(data));
count = data.length;

// Show result
document.getElementById('rName').textContent = name;
document.getElementById('rEmail').textContent = email;
document.getElementById('rTime').textContent = record.time;
document.getElementById('result').style.display = 'block';

setTimeout(function() {
document.getElementById('result').style.display = 'none';
}, 4000);

updateDisplay();

// Sync to Google Sheets
if (SCRIPT_URL !== 'https://script.google.com/macros/s/AKfycbw-rszpjsd8KOfeiX2oQbQYL2ELxbJkh6QxJoib-i7fTFRqzlciDvkYXjNxipVg8hiSug/exec') {
syncGoogle(record);
} else {
status.textContent = '✅ Saved locally';
status.style.background = '#fff3cd';
status.style.color = '#856404';
setTimeout(function() {
status.textContent = 'Ready to scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
}, 2000);
}

console.log('Saved:', record);
}

// Sync to Google Sheets
function syncGoogle(record) {
status.textContent = '☁️ Syncing...';
status.style.background = '#e7f3ff';
status.style.color = '#1565C0';

fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(record)
})
.then(function() {
status.textContent = '✅ Synced to Google Sheets!';
status.style.background = '#d4edda';
status.style.color = '#155724';
setTimeout(function() {
status.textContent = 'Ready to scan';
}, 2000);
})
.catch(function(error) {
console.error('Sync error:', error);
status.textContent = '⚠️ Saved locally only';
status.style.background = '#fff3cd';
status.style.color = '#856404';
setTimeout(function() {
status.textContent = 'Ready to scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
}, 3000);
});
}

// Update display
function updateDisplay() {
document.getElementById('count').textContent = count;

var logDiv = document.getElementById('log');

if (data.length === 0) {
logDiv.innerHTML = '<p style="text-align:center;color:#999;padding:15px">No scans yet</p>';
return;
}

var html = '';
for (var i = 0; i < Math.min(data.length, 10); i++) {
var r = data[i];
html += '<div class="entry">';
html += '<p><strong>' + r.name + '</strong></p>';
html += '<p>Email: ' + r.email + '</p>';
html += '<p>Time: ' + r.time + '</p>';
html += '</div>';
}

logDiv.innerHTML = html;
}

// Export CSV button
document.getElementById('btnExport').addEventListener('click', function() {
if (data.length === 0) {
alert('No data to export');
return;
}

var csv = 'Event,Name,Email,Timestamp
';
for (var i = 0; i < data.length; i++) {
var r = data[i];
csv += '"' + r.event + '","' + r.name + '","' + r.email + '","' + r.time + '"
';
}

var blob = new Blob([csv], {type: 'text/csv'});
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href = url;
a.download = 'Annual_Gathering_2026_Attendance.csv';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);

alert('Exported ' + data.length + ' records to CSV');
});

// Clear button
document.getElementById('btnClear').addEventListener('click', function() {
if (confirm('Clear all local data?

Google Sheets data will remain safe.')) {
data = [];
count = 0;
localStorage.removeItem('attendance');
updateDisplay();
alert('Local data cleared');
}
});

console.log('Scanner ready!');
console.log('Total records:', count);
</script>
</body>
</html>
