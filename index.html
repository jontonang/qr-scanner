<!DOCTYPE html>
<html lang=\"en\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
<title>Annual Gathering 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#333;text-align:center;margin-bottom:20px}
.event-box{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:25px;border-radius:12px;text-align:center;margin-bottom:25px}
.event-box h2{font-size:2em;margin-bottom:10px}
#scanInput{width:100%;padding:20px;font-size:20px;border:3px solid #667eea;border-radius:10px;text-align:center;font-weight:bold;box-sizing:border-box;margin:15px 0}
#scanInput:focus{outline:none;border-color:#5568d3}
.status{padding:15px;background:#d4edda;color:#155724;border-radius:8px;font-weight:bold;text-align:center;margin:15px 0}
.result{background:#d4edda;border:2px solid #28a745;padding:20px;border-radius:10px;margin:20px 0;display:none}
.result h3{color:#155724;margin-bottom:15px}
.result p{margin:10px 0}
.stats{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:25px;border-radius:12px;text-align:center;margin:20px 0}
.stat-number{font-size:4em;font-weight:bold}
.stat-label{font-size:1.2em;margin-top:10px}
button{width:100%;padding:15px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:18px;margin:8px 0}
.btn-export{background:#28a745;color:#fff}
.btn-clear{background:#dc3545;color:#fff}
.log{background:#f8f9fa;padding:15px;border-radius:10px;max-height:350px;overflow-y:auto;margin-top:15px}
.log-entry{background:#fff;padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid #667eea}
.log-entry p{margin:5px 0;color:#555}
</style>
</head>
<body>
<div class=\"container\">
<h1>📱 QR Scanner</h1>
<div class=\"event-box\">
<h2>📅 Annual Gathering 2026</h2>
<p>Auto-Scan Mode</p>
</div>
<input type=\"text\" id=\"scanInput\" placeholder=\"Ready scan...\" autofocus>
<div class=\"status\" id=\"status\">Ready scan</div>
<div class=\"result\" id=\"result\">
<h3>✅ Saved!</h3>
<p><strong>Name:</strong> <span id=\"rName\"></span></p>
<p><strong>Email:</strong> <span id=\"rEmail\"></span></p>
<p><strong>Time:</strong> <span id=\"rTime\"></span></p>
</div>
<div class=\"stats\">
<div class=\"stat-number\" id=\"count\">0</div>
<div class=\"stat-label\">Total Scanned</div>
</div>
<button class=\"btn-export\" onclick=\"exportCSV()\">📥 Export CSV</button>
<button class=\"btn-clear\" onclick=\"clearAll()\">🗑️ Clear All</button>
<h3 style=\"color:#333;margin:20px 0 10px\">Recent Scans:</h3>
<div class=\"log\" id=\"log\">No scans yet</div>
</div>
<script>
var SCRIPT_URL = '[https://script.google.com/macros/s/AKfycbw-rszpjsd8KOfeiX2oQbQYL2ELxbJkh6QxJoib-i7fTFRqzlciDvkYXjNxipVg8hiSug/exec]';
var data = [];
var count = 0;
var timeout;
var lastScan = '';
var lastTime = 0;

var saved = localStorage.getItem('attendance');
if(saved){
try{
data = JSON.parse(saved);
count = data.length;
update();
}catch(e){}
}

var input = document.getElementById('scanInput');
var status = document.getElementById('status');

input.focus();
document.addEventListener('click', function(){
input.focus();
});

input.addEventListener('input', function(){
clearTimeout(timeout);
status.textContent = 'Scanning...';
status.style.background = '#fff3cd';
status.style.color = '#856404';
timeout = setTimeout(function(){
var text = input.value.trim();
if(text){
submit(text);
}
}, 100);
});

input.addEventListener('keypress', function(e){
if(e.key === 'Enter'){
e.preventDefault();
clearTimeout(timeout);
var text = input.value.trim();
if(text){
submit(text);
}
}
});

function submit(text){
var now = Date.now();
if(text === lastScan && (now - lastTime) < 2000){
input.value = '';
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
return;
}
lastScan = text;
lastTime = now;
var name = '';
var email = '';
try{
var json = JSON.parse(text);
name = json.name || '';
email = json.email || '';
}catch(e){
if(text.indexOf(',') > -1){
var parts = text.split(',');
name = parts[0].trim();
email = parts[1] ? parts[1].trim() : 'N/A';
}else{
name = text;
email = 'N/A';
}
}
if(!name){
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
input.value = '';
return;
}
save(name, email);
input.value = '';
}

function save(name, email){
var now = new Date();
var record = {
event: 'Annual Gathering 2026',
name: name,
email: email,
time: now.toLocaleString('en-SG')
};
data.unshift(record);
localStorage.setItem('attendance', JSON.stringify(data));
count = data.length;
document.getElementById('rName').textContent = name;
document.getElementById('rEmail').textContent = email;
document.getElementById('rTime').textContent = record.time;
document.getElementById('result').style.display = 'block';
setTimeout(function(){
document.getElementById('result').style.display = 'none';
}, 4000);
update();
status.textContent = 'Syncing...';
status.style.background = '#e7f3ff';
status.style.color = '#1565C0';
fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(record)
})
.then(function(){
status.textContent = 'Synced!';
status.style.background = '#d4edda';
status.style.color = '#155724';
setTimeout(function(){
status.textContent = 'Ready scan';
}, 2000);
})
.catch(function(){
status.textContent = 'Saved locally';
status.style.background = '#fff3cd';
status.style.color = '#856404';
setTimeout(function(){
status.textContent = 'Ready scan';
status.style.background = '#d4edda';
status.style.color = '#155724';
}, 3000);
});
}

function update(){
document.getElementById('count').textContent = count;
var logDiv = document.getElementById('log');
if(data.length === 0){
logDiv.innerHTML = '<p style=\"text-align:center;color:#999;padding:20px\">No scans yet</p>';
return;
}
var html = '';
for(var i = 0; i < Math.min(data.length, 10); i++){
var r = data[i];
html += '<div class=\"log-entry\">';
html += '<p><strong>' + r.name + '</strong></p>';
html += '<p>Email: ' + r.email + '</p>';
html += '<p>Time: ' + r.time + '</p>';
html += '</div>';
}
logDiv.innerHTML = html;
}

function exportCSV(){
if(data.length === 0){
alert('No data');
return;
}
var csv = 'Event,Name,Email,Time
';
for(var i = 0; i < data.length; i++){
var r = data[i];
csv += '\"' + r.event + '\",\"' + r.name + '\",\"' + r.email + '\",\"' + r.time + '\"
';
}
var blob = new Blob([csv], {type: 'text/csv'});
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href = url;
a.download = 'Attendance.csv';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
alert('Exported ' + data.length + ' records');
}

function clearAll(){
if(confirm('Clear data?')){
data = [];
count = 0;
localStorage.removeItem('attendance');
update();
alert('Cleared');
}
}

console.log('Ready!');
</script>
</body>
</html>
